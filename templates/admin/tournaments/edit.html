{% extends "base.html" %}
{% block title %}Edit {{ tournament.name }} — Code Golf{% endblock %}
{% block content %}
<h1>Edit Tournament</h1>
<form method="post" action="/admin/tournaments/{{ tournament.slug }}" class="problem-form">
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ tournament.name }}" required>
  </div>
  <div class="form-group">
    <label for="slug">Slug</label>
    <input type="text" id="slug" name="slug" value="{{ tournament.slug }}" required pattern="[a-z0-9\-]+">
  </div>
  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" rows="4" class="admin-input">{{ tournament.description }}</textarea>
  </div>
  <div class="form-group">
    <label for="start_date">Start Date <small>(optional)</small></label>
    <input type="date" id="start_date" name="start_date" value="{{ tournament.start_date | default("") }}">
  </div>
  <div class="form-group">
    <label for="end_date">End Date <small>(optional)</small></label>
    <input type="date" id="end_date" name="end_date" value="{{ tournament.end_date | default("") }}">
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="/admin/tournaments" class="btn">Cancel</a>
</form>
{% endblock %}
