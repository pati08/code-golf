{% extends "base.html" %}
{% block title %}New Tournament — Code Golf{% endblock %}
{% block content %}
<h1>New Tournament</h1>
<form method="post" action="/admin/tournaments" class="problem-form">
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>
  </div>
  <div class="form-group">
    <label for="slug">Slug <small>(URL-safe, e.g. spring-2025)</small></label>
    <input type="text" id="slug" name="slug" required pattern="[a-z0-9\-]+">
  </div>
  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" rows="4" class="admin-input"></textarea>
  </div>
  <div class="form-group">
    <label for="start_date">Start Date <small>(optional)</small></label>
    <input type="date" id="start_date" name="start_date">
  </div>
  <div class="form-group">
    <label for="end_date">End Date <small>(optional)</small></label>
    <input type="date" id="end_date" name="end_date">
  </div>
  <button type="submit" class="btn btn-primary">Create Tournament</button>
  <a href="/admin/tournaments" class="btn">Cancel</a>
</form>
{% endblock %}
